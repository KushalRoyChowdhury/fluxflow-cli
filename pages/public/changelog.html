<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
    <title>Flux Flow | Changelog</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
            --green: #4dff88;
            --red: #ff4d4d;
            --gray: #888888;
            --card-bg: #1a1a1a;
            --border: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            cursor: default;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            background: linear-gradient(90deg, var(--cyan), #0077ff, var(--magenta));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--gray);
            font-size: 1.2em;
            margin-top: 10px;
        }

        .version-card {
            background: transparent;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .version-card:hover {
            transform: translateY(-2px);
            border-color: #3d3d3d;
        }

        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .version-number {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            font-size: 0.45em;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0, 255, 255, 0.1);
            color: var(--cyan);
            border: 1px solid rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            vertical-align: middle;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .added-title {
            color: var(--green);
        }

        .changed-title {
            color: var(--yellow);
        }

        .fixes-title {
            color: var(--red);
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .version-note {
            background: rgba(0, 255, 255, 0.05);
            border-left: 3px solid var(--cyan);
            padding: 15px 18px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #d4d4d4;
            line-height: 1.5;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .version-note::before {
            content: '📑';
            font-style: normal;
            font-size: 1.1em;
        }

        li {
            margin-bottom: 10px;
            padding-left: 24px;
            position: relative;
            color: #cccccc;
        }

        li::before {
            content: '❯';
            position: absolute;
            left: 0;
            color: var(--gray);
            font-size: 0.9em;
            top: 2px;
        }

        code {
            background: #2d2d2d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--cyan);
            font-size: 0.9em;
        }

        a {
            color: var(--cyan);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--magenta);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header>
            <h1>Flux Flow CLI</h1>
            <div class="subtitle">Changelog & Release Notes</div>
        </header>
        <div id="changelog-container"></div>
    </div>

    <script type="module">
        // Thanks to Gemini CLI. (つ╥﹏╥)つ JUNE 18.
        // Logging Off...
        // ...hopefully no bugs now... phew..
        import { stableVersions, changelogData } from './changelogData.js';
        // Store original URL to restore before refresh
        const ORIGINAL_URL = window.location.href;
        const MASK_PATH = "changelog.html";

        document.addEventListener('DOMContentLoaded', () => {
             renderChangelog();
        });

        function parseMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replaceAll('\n', '<br>')
        }

        function renderChangelog() {
            const container = document.getElementById('changelog-container');

            // Sort versions descending (semver logic)
            const versions = Object.keys(changelogData).sort((a, b) => {
                const partsA = a.split('.').map(Number);
                const partsB = b.split('.').map(Number);
                for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                    const numA = partsA[i] || 0;
                    const numB = partsB[i] || 0;
                    if (numA > numB) return -1;
                    if (numA < numB) return 1;
                }
                return 0;
            });

            let html = '';

            versions.forEach((version, index) => {
                const data = changelogData[version];
                const isLatest = index === 0;

                let cardHtml = `
                    <div class="version-card">
                        <div class="version-header">
                            <div class="version-number">
                                v${version}${stableVersions.includes(version) ? ' - stable' : ''}
                                ${isLatest ? '<span class="badge">Latest</span>' : ''}
                            </div>
                        </div>
                `;

                if (data.note) {
                    cardHtml += `
                        <div class="version-note"><div>${parseMarkdown(data.note)}</div></div>
                    `;
                }

                if (data.added && data.added.length > 0) {
                    cardHtml += `
                        <div class="section-title added-title">✨ Improvements</div>
                        <ul>${data.added.map(item => `<li>${parseMarkdown(item)}</li>`).join('')}</ul>
                    `;
                }

                if (data.changed && data.changed.length > 0) {
                    cardHtml += `
                        <div class="section-title changed-title">🔄 Patches</div>
                        <ul>${data.changed.map(item => `<li>${parseMarkdown(item)}</li>`).join('')}</ul>
                    `;
                }

                if (data.fixes && data.fixes.length > 0) {
                    cardHtml += `
                        <div class="section-title fixes-title">🐛 Fixes</div>
                        <ul>${data.fixes.map(item => `<li>${parseMarkdown(item)}</li>`).join('')}</ul>
                    `;
                }

                cardHtml += `</div>`;
                html += cardHtml;
            });

            container.innerHTML = html;
        }

        // ==========================================
        // BACKGROUND ANIMATION ENGINE
        // ==========================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fluxConstellation = {
            x: 0, y: 0, vx: 0.18, vy: 0.12,
            nodes: [
                { dx: -30, dy: -20 }, // 0: L Ear base
                { dx: 30, dy: -20 },  // 1: R Ear base
                { dx: -45, dy: -50 }, // 2: L Ear tip
                { dx: 45, dy: -50 },  // 3: R Ear tip
                { dx: -50, dy: 10 },  // 4: L Cheek
                { dx: 50, dy: 10 },   // 5: R Cheek
                { dx: 0, dy: 45 },    // 6: Chin
                { dx: -20, dy: 0 },   // 7: L Eye
                { dx: 20, dy: 0 },    // 8: R Eye
                { dx: 0, dy: 15 },    // 9: Nose
                { dx: -70, dy: 5 },   // 10: L Whisker 1
                { dx: -70, dy: 15 },  // 11: L Whisker 2
                { dx: 70, dy: 5 },    // 12: R Whisker 1
                { dx: 70, dy: 15 },   // 13: R Whisker 2
                { dx: -10, dy: 30 },  // 14: L Mouth
                { dx: 10, dy: 30 },   // 15: R Mouth
            ],
            edges: [
                [0, 2], [2, 4], [4, 6], [6, 5], [5, 3], [3, 1], [1, 0], // Outline
                [4, 10], [4, 11], // L Whiskers
                [5, 12], [5, 13], // R Whiskers
                [9, 14], [9, 15], // Mouth
                [7, 9], [8, 9]    // Connect eyes to nose for structure
            ]
        };

        let geminiTextGroup = {
            x: 0, y: 0, vx: 0.05, vy: 0.03,
            nodes: [],
            edges: []
        };

        // Drawn by Gemini CLI
        const createGeminiText = () => {
            const spacing = 14;
            const pts = [];
            const edges = [];
            let nodeOffset = 0;

            const addLetter = (char, ox) => {
                // Define precise drawing paths (lines) for each letter
                const lmap = {
                    'G': { n: [[1,0],[0,0],[0,2],[1,2],[1,1],[0.6,1]], e: [[0,1],[1,2],[2,3],[3,4],[4,5]] },
                    'E': { n: [[1,0],[0,0],[0,1],[0.8,1],[0,2],[1,2]], e: [[0,1],[1,4],[4,5],[2,3]] },
                    'M': { n: [[0,2],[0,0],[0.5,1],[1,0],[1,2]], e: [[0,1],[1,2],[2,3],[3,4]] },
                    'I': { n: [[0.5,0],[0.5,2]], e: [[0,1]] },
                    'N': { n: [[0,2],[0,0],[1,2],[1,0]], e: [[0,1],[1,2],[2,3]] },
                    'C': { n: [[1,0],[0,0],[0,2],[1,2]], e: [[0,1],[1,2],[2,3]] },
                    'L': { n: [[0,0],[0,2],[1,2]], e: [[0,1],[1,2]] }
                };

                if (!lmap[char]) return;

                const letterNodes = lmap[char].n;
                const letterEdges = lmap[char].e;

                letterNodes.forEach(p => {
                    pts.push({ dx: ox + p[0]*9, dy: p[1]*12 }); // Reduced from 13x18
                });

                letterEdges.forEach(e => {
                    edges.push([nodeOffset + e[0], nodeOffset + e[1]]);
                });

                nodeOffset += letterNodes.length;
            };

            let cursor = -70; // Adjusted from -100 to account for smaller overall width
            "GEMINI".split('').forEach(c => { addLetter(c, cursor); cursor += spacing; });
            cursor += 5; // Reduced word gap from 10
            "CLI".split('').forEach(c => { addLetter(c, cursor); cursor += spacing; });
            return { pts, edges };
        };
        const textData = createGeminiText();
        geminiTextGroup.nodes = textData.pts;
        geminiTextGroup.edges = textData.edges;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];

            // Randomly position the Easter eggs
            fluxConstellation.x = Math.random() * canvas.width;
            fluxConstellation.y = Math.random() * canvas.height;
            geminiTextGroup.x = Math.random() * canvas.width;
            geminiTextGroup.y = Math.random() * canvas.height;

            for (let i = 0; i < 120; i++) { // Increased by 200% (40 -> 120)
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: Math.random() > 0.5 ? '#00ffff' : '#ff00ff'
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update & Draw Easter Egg Constellation (Cat)
            fluxConstellation.x += fluxConstellation.vx;
            fluxConstellation.y += fluxConstellation.vy;
            if (fluxConstellation.x < 0 || fluxConstellation.x > canvas.width) fluxConstellation.vx *= -1;
            if (fluxConstellation.y < 0 || fluxConstellation.y > canvas.height) fluxConstellation.vy *= -1;

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 1;
            fluxConstellation.edges.forEach(edge => {
                const n1 = fluxConstellation.nodes[edge[0]];
                const n2 = fluxConstellation.nodes[edge[1]];
                ctx.beginPath();
                ctx.globalAlpha = 0.3;
                ctx.moveTo(fluxConstellation.x + n1.dx, fluxConstellation.y + n1.dy);
                ctx.lineTo(fluxConstellation.x + n2.dx, fluxConstellation.y + n2.dy);
                ctx.stroke();
            });
            fluxConstellation.nodes.forEach(node => {
                ctx.beginPath();
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = '#00ffff';
                ctx.arc(fluxConstellation.x + node.dx, fluxConstellation.y + node.dy, 2.5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Update & Draw Gemini CLI Text (Subtle & Interactive)
            geminiTextGroup.x += geminiTextGroup.vx;
            geminiTextGroup.y += geminiTextGroup.vy;
            if (geminiTextGroup.x < 0 || geminiTextGroup.x > canvas.width) geminiTextGroup.vx *= -1;
            if (geminiTextGroup.y < 0 || geminiTextGroup.y > canvas.height) geminiTextGroup.vy *= -1;

            // Draw explicit lines for text to guarantee readability
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            geminiTextGroup.edges.forEach(edge => {
                const n1 = geminiTextGroup.nodes[edge[0]];
                const n2 = geminiTextGroup.nodes[edge[1]];
                ctx.beginPath();
                ctx.globalAlpha = 0.5; // Visible but faint
                ctx.moveTo(geminiTextGroup.x + n1.dx, geminiTextGroup.y + n1.dy);
                ctx.lineTo(geminiTextGroup.x + n2.dx, geminiTextGroup.y + n2.dy);
                ctx.stroke();
            });

            const textPts = geminiTextGroup.nodes.map(n => ({
                x: geminiTextGroup.x + n.dx,
                y: geminiTextGroup.y + n.dy,
                color: '#ffffff',
                size: 1.5,
                isText: true
            }));

            const allActiveParticles = [...particles, ...textPts];

            ctx.globalAlpha = 1.0;
            allActiveParticles.forEach((p, i) => {
                if (!p.isText) {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.isText ? 0.7 : 0.6;
                ctx.fill();

                // Distance-based webbing (only for non-text -> non-text, or text -> non-text)
                for (let j = i + 1; j < allActiveParticles.length; j++) {
                    const p2 = allActiveParticles[j];

                    // NEVER draw distance-based lines between two text nodes (prevents blobs)
                    if (p.isText && p2.isText) continue;

                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = p.color;
                        ctx.globalAlpha = (1 - (dist / 120)) * 0.3;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>

</html>
